<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mundo Onírico</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; background: black; color: white; overflow: hidden; }
        #c { position: fixed; top: 0; left: 0; z-index: 1; display: block; }
        .interface-layer { position: absolute; top: 0; left: 0; z-index: 10; width: 100%; height: 100%; display: flex; flex-direction: column; }
        .screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #chat-screen { display: none; height: 100%; background: transparent; position: relative; }

        /* LOGIN */
        .login-card { background: rgba(20, 20, 20, 0.9); border: 1px solid #444; padding: 30px; border-radius: 20px; text-align: center; width: 85%; max-width: 350px; backdrop-filter: blur(10px); }
        .pfp-circle { width: 90px; height: 90px; border-radius: 50%; border: 2px solid #fff; margin: 0 auto 15px; cursor: pointer; overflow: hidden; background: #111; display: flex; align-items: center; justify-content: center; }
        .pfp-circle img { width: 100%; height: 100%; object-fit: cover; }
        input[type="text"] { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid #555; background: #000; color: white; box-sizing: border-box; outline: none; }
        .btn-enter { background: white; color: black; padding: 12px; width: 100%; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }

        /* MENÚ VERTICAL */
        .menu-list { display: flex; flex-direction: column; gap: 20px; }
        .btn-img { width: 260px; cursor: pointer; transition: 0.3s; }
        .wild-off { 
            width: 260px; 
            opacity: 1; /* Opacidad al máximo */
            pointer-events: none; 
        }

        /* CHAT BUBBLES */
        #chat-messages { flex: 1; overflow-y: auto; padding: 20px 15px 120px 15px; display: flex; flex-direction: column; gap: 15px; width: 100%; box-sizing: border-box; }
        .msg-row { display: flex; gap: 10px; max-width: 85%; }
        .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg-row.guardian { align-self: flex-start; }
        .avatar { width: 45px; height: 45px; border-radius: 50%; border: 1px solid #fff; object-fit: cover; flex-shrink: 0; }
        .bubble { padding: 12px 16px; border-radius: 15px; font-size: 15px; line-height: 1.4; }
        .user .bubble { background: white; color: black; border-top-right-radius: 0; }
        .guardian .bubble { background: #333; color: white; border-top-left-radius: 0; }

        /* BARRA INPUT FIJA */
        .input-container { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px 15px; background: rgba(0,0,0,0.9); display: flex; align-items: center; gap: 10px; box-sizing: border-box; backdrop-filter: blur(5px); }
        .input-bar { flex: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 25px; display: flex; align-items: center; padding: 5px 15px; }
        #user-input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; font-size: 16px; }
        .icon-btn { background: transparent; border: none; color: white; font-size: 26px; cursor: pointer; }
        #btn-listen.listening { color: #ff3b30; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <canvas id="c"></canvas>

    <div class="interface-layer">
        <div id="login-screen" class="screen">
            <div class="login-card">
                <div class="pfp-circle" onclick="document.getElementById('file-input').click()">
                    <img id="pfp-preview" src="" style="display:none">
                    <span id="pfp-hint">👤</span>
                </div>
                <input type="file" id="file-input" hidden accept="image/*">
                <input type="text" id="name-input" placeholder="Tu Nombre">
                <button class="btn-enter" onclick="entrar()">ACCEDER</button>
            </div>
        </div>

        <div id="menu-screen" class="screen" style="display:none">
            <div class="menu-list">
                <img src="https://i.postimg.cc/4YK8xqWV/dild.png" class="btn-img" onclick="abrirDild()">
                <img src="https://i.postimg.cc/HVvZHd9z/wild.png" class="wild-off">
            </div>
        </div>

        <div id="chat-screen" class="screen">
            <div id="chat-messages"></div>
            <div class="input-container">
                <div class="input-bar">
                    <input type="text" id="user-input" placeholder="Hablale al conejo...">
                    <button class="icon-btn" onclick="enviarMensaje()">➤</button>
                </div>
                <button id="btn-listen" class="icon-btn">🎤</button>
            </div>
        </div>
    </div>

    <script>
        // --- CANVAS ---
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resize(); window.addEventListener("resize", resize);
        let stars = [];
        for (let i = 0; i < 120; i++) {
            stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 2, alpha: Math.random(), speed: Math.random() * 0.02 });
        }
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let s of stars) {
                s.alpha += s.speed;
                if (s.alpha <= 0 || s.alpha >= 1) s.speed *= -1;
                ctx.globalAlpha = s.alpha; ctx.fillStyle = "white";
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill();
            }
            requestAnimationFrame(draw);
        }
        draw();

        // --- FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyABaTv7yjGsgIu2A6mj6arml2IHGljt_H4",
            authDomain: "ingresa-dfec2.firebaseapp.com",
            databaseURL: "https://ingresa-dfec2-default-rtdb.firebaseio.com",
            projectId: "ingresa-dfec2",
            storageBucket: "ingresa-dfec2.appspot.com",
            messagingSenderId: "441882283200",
            appId: "1:441882283200:web:8067df85facc2d67d77125"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // PERSISTENCIA
        let userName = localStorage.getItem('oniriico_user') || "";
        let userPhoto = localStorage.getItem('oniriico_photo') || "https://www.w3schools.com/howto/img_avatar.png";

        // Al cargar la página
        if(userName) {
            document.addEventListener("DOMContentLoaded", () => {
                document.getElementById('login-screen').style.display = "none";
                document.getElementById('menu-screen').style.display = "flex";
            });
        }

        document.getElementById('file-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = () => {
                userPhoto = reader.result;
                document.getElementById('pfp-preview').src = userPhoto;
                document.getElementById('pfp-preview').style.display = "block";
                document.getElementById('pfp-hint').style.display = "none";
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function entrar() {
            const nameField = document.getElementById('name-input').value.trim();
            if(!nameField) return;
            userName = nameField;
            localStorage.setItem('oniriico_user', userName);
            localStorage.setItem('onirico_photo', userPhoto);
            db.ref('users/' + userName).set({ nombre: userName, photo: userPhoto });
            document.getElementById('login-screen').style.display = "none";
            document.getElementById('menu-screen').style.display = "flex";
        }

        function abrirDild() {
            document.getElementById('menu-screen').style.display = "none";
            document.getElementById('chat-screen').style.display = "flex";
            addMsg("guardian", `Has regresado, ${userName}. Te estaba esperando.`);
        }

        // --- CHAT ---
        const msgContainer = document.getElementById('chat-messages');
        const inputField = document.getElementById('user-input');

        async function enviarMensaje() {
            const text = inputField.value.trim();
            if(!text) return;
            addMsg("user", text);
            inputField.value = "";
            const prompt = `Eres el conejo Guardián de Mundo Onírico, es una app de la novela otome adicta al romace. Eres serio Pero no tanto osea bromeas y asi pero si te preguntan o te ducen que eres amable dices que solo es una frase trillada y que estss programado para ser asi y asi. Usuario: ${userName}. Mensaje: ${text}, tambien eres frio y presiso no llenes con mucho texto.`;
            try {
                const response = await fetch(`https://text.pollinations.ai/${encodeURIComponent(prompt)}`);
                if (!response.ok) throw new Error();
                const aiText = await response.text();
                addMsg("guardian", aiText);
            } catch (err) {
                addMsg("guardian", "Error de conexión.");
            }
        }

        inputField.onkeypress = (e) => { if(e.key === 'Enter') enviarMensaje(); };

        function addMsg(role, text) {
            const row = document.createElement('div');
            row.className = `msg-row ${role}`;
            const img = role === 'user' ? userPhoto : 'https://i.postimg.cc/LgsvPbVM/conejo.png';
            row.innerHTML = `<img src="${img}" class="avatar"><div class="bubble">${text}</div>`;
            msgContainer.appendChild(row);
            msgContainer.scrollTop = msgContainer.scrollHeight;
        }

        // --- MICRO ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'es-ES';
            const btnMic = document.getElementById('btn-listen');
            btnMic.onclick = () => { recognition.start(); btnMic.classList.add('listening'); };
            recognition.onresult = (e) => {
                inputField.value = e.results[0][0].transcript;
                enviarMensaje();
            };
            recognition.onend = () => btnMic.classList.remove('listening');
        }
    </script>
</body>
</html>
